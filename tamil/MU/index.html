<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths OneMark - Main Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../enhanced-styles.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ef 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', 'Quicksand', Arial, sans-serif;
        }
        .header {
            font-size: 2.5em;
            font-weight: 700;
            color: #161742;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .cont {
            display: flex;
            gap: 32px;
            justify-content: center;
        }
        .cont a {
            text-decoration: none;
        }
        .b, .b1 {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(120deg, #161742 60%, #2b3b58 100%);
            color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(22,23,66,0.08);
            padding: 32px 48px;
            font-size: 1.5em;
            font-weight: 600;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
            border: none;
            cursor: pointer;
        }
        .b:hover, .b1:hover {
            background: linear-gradient(120deg, #2b3b58 60%, #161742 100%);
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 8px 32px rgba(22,23,66,0.16);
        }
        @media (max-width: 600px) {
            .cont {
                flex-direction: column;
                gap: 20px;
            }
            .b, .b1 {
                width: 90vw;
                padding: 24px 0;
                font-size: 1.1em;
            }
            .header {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <!-- Splash screen that shows on initial load 
    <div class="splash-screen">
        <img src="s.png" alt="Loading Splash Screen">
    </div>
    -->
    <h1 class="header">Tamil</h1>
    <div class="cont">
        <a href="../main.html" class="b"><h3>Chapter Wise</h3></a>
        <a href="../v1.html" class="b1"><h3>Full Book</h3></a>
    </div>
</body>
</html>
