<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths - Chapter Wise Selection</title>
    <link rel="stylesheet" href="enhanced-styles.css">
    <style>
        /* --- Basic Setup --- */
        body {
            font-family: 'Montserrat', sans-serif; /* Fallback to a common sans-serif font */
            margin: 0;
            padding: 0;
            background-color: #121212;
            background-image: linear-gradient(315deg, #121212 0%, #000000 74%);
            color: #ffffff;
            text-align: center;
        }

        /* --- Header Styling --- */
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .main-header h1 {
            margin: 0;
            font-size: 1.5em;
        }

        /* --- Main Content Wrapper --- */
        .content-wrapper {
            padding-top: 100px; /* Pushes content below the fixed header */
            padding-bottom: 40px;
            width: 100%;
        }

        .content-wrapper h2 {
            margin: 20px;
            color: #ccc;
            font-weight: normal;
        }

        /* --- Chapter Button Grid --- */
        .button-container {
            display: grid;
            grid-template-columns: repeat(1, 1fr); /* Default for small screens */
            gap: 20px;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            background: linear-gradient(145deg, #333, #222);
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #444;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
            font-weight: bold;
        }

        .button:hover {
            background: linear-gradient(145deg, #444, #333);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- Responsive Grid Layouts --- */
        @media (min-width: 600px) {
            .button-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 900px) {
            .button-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Top Header Bar -->
    <header class="main-header">
        <h1>12th Tamil Objective - Chapter Wise</h1>
    </header>

    <!-- Main Content Area -->
    <main class="content-wrapper">
        <h2>Made By Saravanan</h2>

        <section class="button-container" id="chapters-container">
            <a href="c1.html" class="button" data-chapter="1">
                <span>Chapter 1</span>
            </a>
            <a href="c2.html" class="button" data-chapter="2">
                <span>Chapter 2</span>
            </a>
            <a href="c3.html" class="button" data-chapter="3">
                <span>Chapter 3</span>
            </a>
            <a href="c4.html" class="button" data-chapter="4">
                <span>Chapter 4</span>
            </a>
            <!-- Add more chapters here as needed -->
        </section>
    </main>
</body>
</html>
