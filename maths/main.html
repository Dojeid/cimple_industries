<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Chapter Wise</title>
    <style>
        @font-face {
            font-family: 'YourFontName';
            src: url('/Montserrat-Medium.ttf') format('woff2');
        }

        body {
            font-family: 'YourFontName', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            background-image: linear-gradient(315deg, #121212 0%, #000000 74%);
            text-align: center;
            font-weight: bolder;
            overflow: hidden;
            color: #ffffff;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: auto;
        }

        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            background-color: #333;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .button:hover {
            background-color: #555;
        }

        @media (min-width: 300px) {
            .button-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 900px) {
            .button-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        h1 {
            margin: 70px;
            padding: 90px;
            color: #ffffff;
        }
    </style>
</head>
