<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths One Mark Tests</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-gray-900 text-gray-100 min-h-screen flex flex-col transition-all duration-500 ease-in-out;
        }

        /* Vanta Background */
        #vanta-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* Animated Title */
        .header-title {
            @apply text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 via-sky-500 to-blue-600;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
            animation: glow 5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            0% {
                text-shadow: 0 0 10px rgba(0, 191, 255, 0.4), 0 0 20px rgba(0, 191, 255, 0.4);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(0, 191, 255, 0.8), 0 0 60px rgba(0, 0, 255, 0.6);
            }
            100% {
                text-shadow: 0 0 15px rgba(0, 191, 255, 0.5), 0 0 30px rgba(0, 191, 255, 0.5);
            }
        }
        
        /* Card image and overlay styling */
        .card-bg-image {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .card-overlay {
            @apply absolute inset-0 bg-black bg-opacity-30 flex flex-col justify-center items-center text-center p-6 transition-all duration-300 ease-in-out;
        }

        .btn-card:hover .card-overlay {
            @apply bg-opacity-20 backdrop-blur-md;
        }

        /* Button hover animation */
        .btn-card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 191, 255, 0.3);
            border-color: rgba(0, 191, 255, 0.8);
        }
        
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Background -->
    <div id="vanta-bg"></div>

    <!-- Main Content Container -->
    <div class="flex-1 flex flex-col justify-center items-center p-4">

        <!-- Header Section -->
        <header class="text-center mb-12 mt-16 sm:mt-24">
            <h1 class="header-title tracking-wider">
                12th Maths One Mark Tests
            </h1>
            <p class="text-xs sm:text-sm md:text-base text-gray-400 mt-2 font-medium">
                By Saravanan
            </p>
        </header>

        <!-- Navigation Buttons -->
        <!-- This section holds the main navigation links for the site -->
        <div class="flex flex-col md:flex-row justify-center items-center gap-8 mt-12 mb-20 w-full max-w-4xl px-4">
    <!-- Chapter Wise -->

        <div class="absolute inset-0 bg-black bg-opacity-30"></div>
        <div class="relative z-10 flex justify-center items-center h-full">
            <div class="bg-white bg-opacity-70 backdrop-blur-md rounded-lg p-4 w-5/6 text-center">
                <h3 class="text-xl text-gray-800 font-bold mb-2">Chapter Wise</h3>
            </div>
        </div>
    </a>

    <!-- Volume 1 -->

        <div class="absolute inset-0 bg-black bg-opacity-30"></div>
        <div class="relative z-10 flex justify-center items-center h-full">
            <div class="bg-white bg-opacity-70 backdrop-blur-md rounded-lg p-4 w-5/6 text-center">
                <h3 class="text-xl text-gray-800 font-bold mb-2">Volume 1</h3>

    <!-- Volume 2 -->
    <a href="../v2.html" class="btn-card relative w-full md:w-64 h-80 rounded-2xl overflow-hidden border-2 border-gray-700 shadow-lg transition-all duration-300 ease-in-out bg-cover bg-center" style="background-image: url('v2.png');">
        <div class="absolute inset-0 bg-black bg-opacity-30"></div>

</div>

    <!-- Vanta.js -->
    <!-- This script sets up the animated background using the Vanta.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            VANTA.FOG({
                el: "#vanta-bg",
                highlightColor: 0x00bfff,
                midtoneColor: 0x0a0d13,
                lowlightColor: 0x1a1e26,
                baseColor: 0x000000,
                blurFactor: 0.6,
                speed: 1.8,
                zoom: 1.0,
                gyroControls: true,
                touchControls: true,
            });
        });
    </script>
</body>
</html>
